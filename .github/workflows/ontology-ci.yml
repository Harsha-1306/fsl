name: FSL Ontology Validation CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pyshacl rdflib

      - name: Run validation (Makefile or fallback)
        run: |
          if [ -f validation/Makefile ]; then
            make -C validation
          else
            echo "No Makefile found, running fallback validation"
            python -m pyshacl -s ontologies -e ontologies test_fail.ttl
          fi
      - name: Fail CI on SHACL violation
        run: |
          if grep -R "Severity: sh:Violation" validation/*.log; then
            exit 1
          fi
           
      - name: Fail if SHACL violations exist
        run: |
          if grep -R "Severity: sh:Violation" validation/*.log; then
            echo "❌ SHACL violations found."
            exit 1
          else
            echo "✅ No SHACL violations."
          fi

      - name: Upload validation logs
        uses: actions/upload-artifact@v4
        with:
          name: validation-logs
          path: |
            **/*.log
            **/*.ttl
